<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily English</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:#0f0f1a; color:#e8e8f0;
            height:100dvh; display:flex; flex-direction:column;
            max-width:480px; margin:0 auto; overflow:hidden;
        }

        /* Setup */
        #setup-screen {
            display:flex; flex-direction:column; justify-content:center;
            align-items:center; padding:40px 28px; height:100dvh; gap:20px;
        }
        .setup-emoji { font-size:52px; }
        .setup-title { font-size:26px; font-weight:700; color:#fff; }
        .setup-desc  { font-size:14px; color:#9999b8; text-align:center; line-height:1.6; }
        .setup-input {
            width:100%; background:#1e1e30; border:1px solid #2d2d45;
            border-radius:12px; padding:14px 16px;
            color:#e8e8f0; font-size:15px; outline:none;
        }
        .setup-input:focus { border-color:#5555cc; }
        .setup-btn {
            width:100%; padding:16px; border-radius:12px; border:none;
            background:#4444bb; color:#fff; font-size:16px; font-weight:600; cursor:pointer;
        }
        .setup-link { font-size:12px; color:#6b6bcc; text-decoration:none; }

        /* Main */
        #main-screen { display:none; flex-direction:column; height:100dvh; }

        .header {
            padding:14px 18px 10px; display:flex; align-items:center;
            justify-content:space-between; border-bottom:1px solid #1e1e30;
            background:#13131f; flex-shrink:0;
        }
        .header-title { font-size:17px; font-weight:700; color:#fff; }
        .header-date  { font-size:11px; color:#6b6b88; margin-top:1px; }
        .header-right { display:flex; align-items:center; gap:8px; }
        .icon-btn  { background:none; border:none; color:#6b6b88; cursor:pointer; padding:4px; line-height:0; }
        .voice-sel {
            background:#1a1a2c; border:1px solid #2d2d45; border-radius:8px;
            color:#9999cc; font-size:12px; padding:5px 8px; cursor:pointer; outline:none;
        }

        /* Topic chips */
        .chip-row {
            display:flex; gap:7px; overflow-x:auto;
            padding:10px 16px 6px; scrollbar-width:none; flex-shrink:0;
        }
        .chip-row::-webkit-scrollbar { display:none; }
        .chip {
            flex-shrink:0; padding:5px 13px; border-radius:20px;
            font-size:12px; background:#1a1a28; color:#8888aa;
            cursor:pointer; border:1px solid #252535;
            -webkit-tap-highlight-color:transparent; user-select:none;
        }
        .chip.active { background:#30305a; color:#9999ee; border-color:#4444aa; }

        /* Scenario card */
        .s-card {
            margin:0 14px 6px; padding:10px 14px;
            background:#16162a; border-radius:11px; border:1px solid #222238; flex-shrink:0;
        }
        .s-label { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:#5555aa; margin-bottom:2px; }
        .s-title { font-size:14px; font-weight:600; color:#ddd; margin-bottom:3px; }
        .s-situation { font-size:12px; color:#8888a8; line-height:1.4; margin-bottom:6px; }
        .vocab-row { display:flex; flex-wrap:wrap; gap:5px; }
        .vocab-tag { font-size:11px; padding:2px 8px; background:#1e1e38; border-radius:20px; color:#7070aa; }

        /* Chat */
        #chat { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
        .msg { max-width:84%; padding:10px 13px; border-radius:16px; font-size:15px; line-height:1.5; }
        .msg.tutor     { background:#1c1c32; align-self:flex-start; border-bottom-left-radius:4px; color:#dde; }
        .msg.user      { background:#353590; align-self:flex-end;   border-bottom-right-radius:4px; color:#fff; }
        .msg.correction{ background:#221a00; border:1px solid #3a2800; align-self:flex-end;
                         font-size:12px; color:#f0c040; font-style:italic; padding:7px 11px;
                         border-bottom-right-radius:4px; }
        .msg.system    { align-self:center; font-size:12px; color:#555570; background:none; padding:2px; }

        /* Improved bubble */
        .msg.improved {
            align-self:flex-end; max-width:88%;
            background:#141f10; border:1px solid #2a4a1a;
            border-bottom-right-radius:4px;
            display:flex; flex-direction:column; gap:6px;
        }
        .imp-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#5a8a4a; }
        .imp-text  { font-size:14px; color:#aaddaa; line-height:1.5; }
        .shadow-btn {
            align-self:flex-start; background:none; border:1px solid #2a4a1a;
            border-radius:12px; color:#5a8a4a; font-size:11px; padding:3px 9px; cursor:pointer;
        }

        /* Typing indicator */
        .typing {
            display:flex; gap:4px; align-items:center;
            padding:12px 14px; background:#1c1c32;
            border-radius:16px; border-bottom-left-radius:4px; align-self:flex-start;
        }
        .dot { width:6px; height:6px; border-radius:50%; background:#5555aa; animation:bounce 1.2s infinite; }
        .dot:nth-child(2){ animation-delay:.2s; }
        .dot:nth-child(3){ animation-delay:.4s; }
        @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }

        /* Input bar */
        .input-bar {
            padding:10px 16px;
            padding-bottom:calc(10px + env(safe-area-inset-bottom));
            background:#13131f; border-top:1px solid #1e1e30;
            display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0;
        }
        .mic-btn {
            width:68px; height:68px; border-radius:50%; border:none; background:#3a3aaa;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent;
            box-shadow:0 4px 18px rgba(58,58,170,.45);
        }
        .mic-btn.recording { background:#bb2222; box-shadow:0 4px 22px rgba(187,34,34,.6); animation:pulse 1s infinite; }
        .mic-btn.speaking  { background:#1a7744; box-shadow:0 4px 18px rgba(26,119,68,.5); }
        @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.07)} }
        .mic-hint { font-size:12px; color:#55556a; }
        .text-row { display:flex; width:100%; gap:8px; align-items:flex-end; }

        /* Auto-expanding textarea — shows full suggestion text */
        #txt {
            flex:1; background:#1a1a2c; border:1px solid #252540;
            border-radius:16px; padding:10px 15px;
            color:#e8e8f0; font-size:15px; outline:none;
            resize:none; overflow:hidden; min-height:44px; max-height:140px;
            line-height:1.45; font-family:inherit;
        }
        #txt:focus { border-color:#4040aa; }
        .send-btn {
            width:42px; height:42px; border-radius:50%; border:none;
            background:#3a3aaa; color:#fff; flex-shrink:0;
            display:flex; align-items:center; justify-content:center; cursor:pointer;
        }
    </style>
</head>
<body>

<!-- Setup -->
<div id="setup-screen">
    <div class="setup-emoji">🗣️</div>
    <div class="setup-title">Daily English</div>
    <div class="setup-desc">
        Voice conversation practice from your knowledge.<br>
        Gemini neural TTS · shadowing × 2 · wiki saves.
    </div>
    <input id="key-in" type="password" class="setup-input"
           placeholder="Paste your Gemini API key"
           autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="setup-btn" onclick="saveKey()">Start Practicing</button>
    <a class="setup-link" href="https://aistudio.google.com/apikey" target="_blank">
        Get a free key at aistudio.google.com →
    </a>
</div>

<!-- Main -->
<div id="main-screen">
    <div class="header">
        <div>
            <div class="header-title">Daily English</div>
            <div class="header-date" id="hdr-date"></div>
        </div>
        <div class="header-right">
            <select id="voice-sel" class="voice-sel" onchange="setVoice(this.value)">
                <option value="Aoede">Aoede ♀</option>
                <option value="Kore">Kore ♀</option>
                <option value="Puck">Puck ♂</option>
                <option value="Charon">Charon ♂</option>
                <option value="Fenrir">Fenrir ♂</option>
            </select>
            <button class="icon-btn" onclick="pickScenario(currentIdx())" title="Retry / restart">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
            <button class="icon-btn" onclick="saveConversation()" title="Save conversation">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/>
                </svg>
            </button>
            <button class="icon-btn" onclick="goSetup()" title="Settings">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54A.48.48 0 0 0 14 2h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.1 7.1 0 0 0-1.61.94l-2.4-.96a.48.48 0 0 0-.58.22L2.8 8.47a.47.47 0 0 0 .11.61l2.03 1.58A7.2 7.2 0 0 0 4.86 12c0 .32.02.63.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.06.28.31.48.59.48h3.84c.28 0 .53-.2.58-.48l.36-2.54c.58-.27 1.12-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
                </svg>
            </button>
        </div>
    </div>

    <audio id="tts-audio" playsinline style="display:none"></audio>

    <div class="chip-row" id="chip-row"></div>
    <div class="s-card" id="s-card"></div>
    <div id="chat"></div>

    <div class="input-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            <svg width="28" height="28" fill="white" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
            </svg>
        </button>
        <div class="mic-hint" id="mic-hint">Tap mic to speak</div>
        <div class="text-row">
            <textarea id="txt" rows="1"
                placeholder="Suggested answer appears here — edit or speak it…"
                autocorrect="off" spellcheck="false"
                oninput="autoResize(this)"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTxt();}"></textarea>
            <button class="send-btn" onclick="sendTxt()">
                <svg width="17" height="17" fill="white" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
// ─── Scenarios (context only — Gemini generates all questions dynamically) ────
const SCENARIOS = [
  { id:"quant-ml",      topic:"Quant Finance",         title:"ML Models in Trading",
    persona:"Dr. Sarah Chen, senior quant researcher at a hedge fund",
    situation:"A coffee-chat where she wants your take on ML and transformer models in finance.",
    vocabulary:["alpha","factor momentum","overfitting","regime detection","Sharpe ratio"] },

  { id:"quant-risk",    topic:"Risk & Volatility",      title:"Volatility Forecasting",
    persona:"Marcus, a risk manager who has used GARCH for 15 years",
    situation:"You're pitching Bayesian and ML volatility approaches to a skeptic.",
    vocabulary:["GARCH","Hurst exponent","tail risk","drawdown","volatility clustering"] },

  { id:"quant-rl",      topic:"Quant Finance",          title:"RL for Trading",
    persona:"Lena, a VC evaluating a quant fintech startup",
    situation:"You're explaining why RL-based trading is promising — and where it fails.",
    vocabulary:["reward function","market impact","adaptability","Q-learning","benchmark"] },

  { id:"claude-code",   topic:"AI Dev Tools",           title:"Agentic Coding",
    persona:"Jamie, a startup CTO choosing between AI coding tools",
    situation:"You're recommending Claude Code to someone who only uses GitHub Copilot.",
    vocabulary:["agentic workflow","sub-agents","context window","multi-step tasks","orchestration"] },

  { id:"gemini",        topic:"AI Dev Tools",           title:"Google Gemini APIs",
    persona:"Priya, a PM evaluating AI APIs for her team",
    situation:"Her team uses OpenAI; her CTO wants an honest Gemini evaluation.",
    vocabulary:["managed agents","multimodal","file input","rate limits","API ecosystem"] },

  { id:"flutterflow",   topic:"App Development",        title:"Visual vs. Code-First Dev",
    persona:"Chris, a solo developer building his first mobile app",
    situation:"He's deciding between Flutter from scratch and DreamFlow. You've used both.",
    vocabulary:["visual builder","native performance","code generation","iteration speed","MCP integration"] },

  { id:"singapore",     topic:"Travel",                 title:"Singapore Family Trip",
    persona:"Alex, a friend who lived in Singapore for 3 years",
    situation:"You're planning a family trip there in August 2026 and want local advice.",
    vocabulary:["hawker center","MRT","itinerary","heritage trail","humid"] },

  { id:"theatre",       topic:"Arts Education",         title:"Theatre for Children",
    persona:"Nora, a drama teacher writing a school arts program proposal",
    situation:"She wants help arguing why theatre should be core curriculum.",
    vocabulary:["creative confidence","public speaking","empathy","performing arts","stage fright"] },

  { id:"pyeongchang",   topic:"Travel",                 title:"Pyeongchang Weekend",
    persona:"Soyeon, a colleague who thinks Pyeongchang is just a ski destination",
    situation:"You're convincing her it's a great June weekend trip.",
    vocabulary:["mountain scenery","buckwheat noodles","off-season","weekend getaway","scenic drive"] },

  { id:"howard-marks",  topic:"Investment Philosophy",  title:"Market Cycles & Thinking",
    persona:"Robert, a value investor who just read Howard Marks' latest memo",
    situation:"Lunch debate about whether markets are overvalued and how to act on it.",
    vocabulary:["market cycle","second-level thinking","risk-adjusted return","contrarian","margin of safety"] },
];

// ─── State ────────────────────────────────────────────────────────────────────
let apiKey = '';
let scenario = null;
let history = [];
let conversationLog = [];
let recog = null;
let isRec = false;
let isTalking = false;
const synth = window.speechSynthesis;
let ttsVoice = localStorage.getItem('tts-voice') || 'Kore';
const ttsEl = () => document.getElementById('tts-audio');

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
    apiKey = localStorage.getItem('g-key') || '';
    if (apiKey) showMain();
    const el = document.getElementById('hdr-date');
    if (el) el.textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function saveKey() {
    const k = document.getElementById('key-in').value.trim();
    if (!k) { alert('Please enter your API key.'); return; }
    apiKey = k; localStorage.setItem('g-key', k); showMain();
}

function goSetup() {
    // Pre-fill current key so user can see/edit it
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
    const el = document.getElementById('key-in');
    if (el && apiKey) el.value = apiKey;
    stopAudio();
}

function setVoice(n) { ttsVoice = n; localStorage.setItem('tts-voice', n); }

function showMain() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    const sel = document.getElementById('voice-sel');
    if (sel) sel.value = ttsVoice;
    renderChips();
    const day = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
    pickScenario(day % SCENARIOS.length);
}

// ─── Scenario ─────────────────────────────────────────────────────────────────
function currentIdx() {
    return SCENARIOS.findIndex(s => s.id === scenario?.id) || 0;
}

function renderChips() {
    document.getElementById('chip-row').innerHTML =
        SCENARIOS.map((s,i) => `<div class="chip" id="chip-${i}" onclick="pickScenario(${i})">${s.topic}</div>`).join('');
}

function pickScenario(idx) {
    document.querySelectorAll('.chip').forEach((c,i) => c.classList.toggle('active', i===idx));
    scenario = SCENARIOS[idx];
    history = []; conversationLog = [];
    stopAudio(); setSuggestion('');

    document.getElementById('s-card').innerHTML = `
        <div class="s-label">${scenario.topic}</div>
        <div class="s-title">${scenario.title}</div>
        <div class="s-situation">${scenario.situation}</div>
        <div class="vocab-row">${scenario.vocabulary.map(v=>`<span class="vocab-tag">${v}</span>`).join('')}</div>`;

    document.getElementById('chat').innerHTML = '';
    sysMsg(`With: ${scenario.persona}`);
    startConversation();
}

// ─── Chat helpers ─────────────────────────────────────────────────────────────
function sysMsg(t) { appendMsg(t, 'system'); }

function appendMsg(t, cls) {
    const el = document.createElement('div');
    el.className = `msg ${cls}`; el.textContent = t;
    document.getElementById('chat').appendChild(el);
    scrollDown(); return el;
}

function showImprovedBubble(text) {
    const safe = text.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const el = document.createElement('div');
    el.className = 'msg improved';
    el.innerHTML = `<div class="imp-label">✦ Better English</div>
        <div class="imp-text">${escH(text)}</div>
        <button class="shadow-btn" onclick="speak('${safe}')">🔊 Shadow again</button>`;
    document.getElementById('chat').appendChild(el);
    scrollDown();
}

function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTyping() {
    const el = document.createElement('div');
    el.id='typing'; el.className='typing';
    el.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    document.getElementById('chat').appendChild(el); scrollDown();
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function scrollDown() {
    const c = document.getElementById('chat');
    setTimeout(()=>c.scrollTo({top:c.scrollHeight,behavior:'smooth'}),40);
}

// ─── Text box helpers ─────────────────────────────────────────────────────────
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function setSuggestion(text) {
    const el = document.getElementById('txt');
    el.value = text;
    autoResize(el);
}

// ─── Gemini prompts (labeled text — no JSON, no parsing fragility) ───────────
function openingPrompt() {
    const s = scenario;
    return `You are ${s.persona}. Start a conversation with Jae (Korean software engineer & quant researcher) about: ${s.situation}
Vocabulary to use naturally: ${s.vocabulary.join(', ')}

Write exactly two lines. Start the first line with "TUTOR:" and the second with "SUGGESTION:". No other text before, between, or after.
TUTOR: <brief intro + one direct question, 2 sentences max>
SUGGESTION: <one full natural example answer Jae could say, 1-2 sentences>`;
}

function turnPrompt() {
    const s = scenario;
    return `You are ${s.persona} talking with Jae (Korean software engineer & quant researcher).
Context: ${s.situation}
Rules: react to what Jae said, dig deeper each turn, never repeat a question, 2-3 sentences max.
Vocabulary: ${s.vocabulary.join(', ')}

Write exactly four lines starting with these labels. No other text.
IMPROVED: <Jae's sentence rewritten as fluent natural English, same meaning>
NOTE: <one grammar fix, or leave blank>
TUTOR: <your reaction + one new follow-up question>
SUGGESTION: <one full example answer Jae could give>`;
}

// ─── Parse labeled response ───────────────────────────────────────────────────
// Labels: TUTOR / SUGGESTION / IMPROVED / NOTE
// Handles: labeled format, partial labels, no labels at all

const LABELS = '(?:IMPROVED|NOTE|TUTOR|SUGGESTION)';

function getField(raw, label) {
    // Match LABEL: ... up to next known label or end-of-string
    const m = raw.match(new RegExp(`${label}:\\s*([\\s\\S]+?)(?=\\n${LABELS}:|$)`, 'i'));
    return m ? m[1].trim() : '';
}

function splitOnLabel(raw, label) {
    const idx = raw.search(new RegExp(label + ':', 'i'));
    if (idx === -1) return ['', ''];
    return [raw.slice(0, idx).trim(), raw.slice(idx + label.length + 1).trim()];
}

function parseOpening(raw) {
    if (!raw) return null;

    // 1. Labeled format
    const tutor = getField(raw, 'TUTOR');
    if (tutor) return { tutor, suggestion: getField(raw, 'SUGGESTION') };

    // 2. Has SUGGESTION: somewhere — everything before it is the tutor text
    if (/SUGGESTION:/i.test(raw)) {
        const [t, s] = splitOnLabel(raw, 'SUGGESTION');
        if (t) return { tutor: t, suggestion: s };
    }

    // 3. No labels — entire response is the tutor question
    return { tutor: raw.trim(), suggestion: '' };
}

function parseTurn(raw) {
    if (!raw) return null;

    // 1. Fully labeled
    const tutor = getField(raw, 'TUTOR');
    if (tutor) {
        return {
            improved:   getField(raw, 'IMPROVED'),
            note:       getField(raw, 'NOTE'),
            tutor,
            suggestion: getField(raw, 'SUGGESTION'),
        };
    }

    // 2. Has SUGGESTION: — everything before is the tutor block
    if (/SUGGESTION:/i.test(raw)) {
        const [t, s] = splitOnLabel(raw, 'SUGGESTION');
        return { improved: '', note: '', tutor: t || raw.trim(), suggestion: s };
    }

    // 3. No labels at all
    return { improved: '', note: '', tutor: raw.trim(), suggestion: '' };
}

// ─── Start conversation (Gemini generates the opening) ────────────────────────
async function startConversation() {
    showTyping();
    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
            { method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({
                contents: [{ role:'user', parts:[{text:'[START]'}] }],
                system_instruction: { parts:[{text: openingPrompt()}] },
                // thinkingBudget:0 disables reasoning tokens — they otherwise
                // eat maxOutputTokens and truncate the visible reply (root cause).
                generationConfig: { temperature:0.9, maxOutputTokens:800,
                                    thinkingConfig:{ thinkingBudget:0 } }
              })
            }
        );
        hideTyping();

        if (!res.ok) {
            const e = await res.json().catch(()=>({}));
            const msg = e?.error?.message || `HTTP ${res.status}`;
            appendMsg(`⚠ API error: ${msg}`, 'system');
            appendMsg('Tap ↺ to retry, or ⚙ to update your API key.', 'system');
            return;
        }

        const data = await res.json();
        const candidate = data?.candidates?.[0];
        const raw = candidate?.content?.parts?.[0]?.text || '';
        const finish = candidate?.finishReason || 'unknown';
        console.log('[opening] finishReason:', finish, 'usage:', data?.usageMetadata);
        if (!raw) {
            appendMsg(`⚠ Empty response (${finish}). Tap ↺ to retry.`, 'system');
            return;
        }
        if (finish === 'MAX_TOKENS') appendMsg(`⚠ Reply truncated (MAX_TOKENS) — thinking budget may not be disabled on this model.`, 'system');

        const parsed = parseOpening(raw);
        const tutor      = parsed?.tutor      || raw.trim();
        const suggestion = parsed?.suggestion || '';

        history.push({ role:'model', parts:[{text:tutor}] });
        conversationLog.push({ role:'tutor', text:tutor });
        appendMsg(tutor, 'tutor');
        setSuggestion(suggestion);
        await speak(tutor);
    } catch(err) {
        hideTyping();
        appendMsg(`⚠ Network error: ${err.message}`, 'system');
    }
}

// ─── Main exchange (user replied → get improved + next question) ──────────────
async function callGemini(userText) {
    history.push({ role:'user', parts:[{text:userText}] });
    showTyping();
    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
            { method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({
                system_instruction: { parts:[{text: turnPrompt()}] },
                contents: history,
                // thinkingBudget:0 — see startConversation note (same root cause)
                generationConfig: { temperature:0.85, maxOutputTokens:1000,
                                    thinkingConfig:{ thinkingBudget:0 } }
              })
            }
        );
        hideTyping();
        if (!res.ok) {
            const e=await res.json().catch(()=>({}));
            const msg = e?.error?.message || res.status;
            appendMsg(`⚠ API error: ${msg}`,'system');
            if ((msg+'').toLowerCase().includes('api key')) goSetup();
            return;
        }
        const data = await res.json();
        const candidate = data?.candidates?.[0];
        const raw = candidate?.content?.parts?.[0]?.text || '';
        const finish = candidate?.finishReason || 'unknown';
        console.log('[turn] finishReason:', finish, 'usage:', data?.usageMetadata);
        if (finish === 'MAX_TOKENS') appendMsg(`⚠ Reply truncated (MAX_TOKENS).`, 'system');
        const parsed = parseTurn(raw) || { improved:userText, note:'', tutor: raw||'(no response)', suggestion:'' };
        const { improved=userText, note='', tutor='', suggestion='' } = parsed;

        conversationLog.push({ role:'user', original:userText, improved, note });

        const isDiff = improved.trim().toLowerCase() !== userText.trim().toLowerCase();
        if (isDiff) showImprovedBubble(improved);
        if (note)  setTimeout(()=>appendMsg(`📝 ${note}`,'correction'), 80);

        // Flow: shadow improved ×2 → show tutor → speak tutor → prefill suggestion
        (async () => {
            if (isDiff) {
                await speak(improved);  // shadow 1
                await speak(improved);  // shadow 2
            }
            history.push({ role:'model', parts:[{text:tutor}] });
            conversationLog.push({ role:'tutor', text:tutor });
            appendMsg(tutor, 'tutor');
            await speak(tutor);
            setSuggestion(suggestion);
        })();

    } catch(err) {
        hideTyping();
        appendMsg(`⚠ Network error: ${err.message}`, 'system');
    }
}

// ─── Speech input ─────────────────────────────────────────────────────────────
function initRecog() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.continuous=false; r.interimResults=false; r.lang='en-US';
    r.onresult = e => { const t=e.results[0][0].transcript; stopRec(); handleInput(t); };
    r.onerror  = e => {
        stopRec();
        const msgs = {
            'not-allowed':'🎤 Mic blocked. Safari → Settings → this site → Microphone → Allow, then reload.',
            'no-speech':  null,
            'network':    '⚠ Speech recognition needs a network connection.',
            'aborted':    null,
        };
        const msg = msgs[e.error]!==undefined ? msgs[e.error] : `⚠ Mic error: ${e.error}`;
        if (msg) appendMsg(msg, 'system');
    };
    r.onend = ()=>{ if(isRec) stopRec(); };
    return r;
}

function toggleMic() {
    unlockAudio();
    if (isTalking) { stopAudio(); return; }
    isRec ? stopRec() : startRec();
}

function startRec() {
    if (!recog) recog = initRecog();
    if (!recog) { appendMsg('⚠ Voice not supported — please type.','system'); document.getElementById('txt').focus(); return; }
    stopAudio();
    try { recog.start(); isRec=true; updateMic(); }
    catch(e) {
        recog = initRecog();
        try { recog.start(); isRec=true; updateMic(); }
        catch(e2) { appendMsg(`⚠ Mic error: ${e2.message}`,'system'); }
    }
}

function stopRec() { try{recog?.stop();}catch(e){} isRec=false; updateMic(); }

function updateMic() {
    const btn=document.getElementById('mic-btn'), hint=document.getElementById('mic-hint');
    btn.className='mic-btn';
    if(isRec)        { btn.classList.add('recording'); hint.textContent='Listening… tap to stop'; }
    else if(isTalking){ btn.classList.add('speaking');  hint.textContent='Tap mic to interrupt'; }
    else              { hint.textContent='Tap mic to speak'; }
}

// ─── TTS (Gemini neural, returns Promise) ────────────────────────────────────
function makeSilentUrl() {
    const sr=8000, n=1600;
    const buf=new ArrayBuffer(44+n); const v=new DataView(buf);
    const s=(o,t)=>[...t].forEach((c,i)=>v.setUint8(o+i,c.charCodeAt(0)));
    s(0,'RIFF'); v.setUint32(4,36+n,true); s(8,'WAVE'); s(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr,true);
    v.setUint16(32,1,true); v.setUint16(34,8,true);
    s(36,'data'); v.setUint32(40,n,true);
    new Uint8Array(buf,44).fill(128);
    return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

function unlockAudio() {
    const el=ttsEl();
    if (!el||el.dataset.unlocked) return;
    const url=makeSilentUrl();
    el.src=url;
    el.play().then(()=>{el.pause();el.src='';el.dataset.unlocked='1';URL.revokeObjectURL(url);}).catch(()=>{URL.revokeObjectURL(url);});
}

function stopAudio() {
    const el=ttsEl(); if(el){el.pause();el.src='';}
    isTalking=false; updateMic();
}

function pcmToWav(bytes) {
    const sr=24000,ch=1,bps=16,n=bytes.byteLength;
    const buf=new ArrayBuffer(44+n); const v=new DataView(buf);
    const s=(o,t)=>[...t].forEach((c,i)=>v.setUint8(o+i,c.charCodeAt(0)));
    s(0,'RIFF'); v.setUint32(4,36+n,true); s(8,'WAVE'); s(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*ch*bps/8,true);
    v.setUint16(32,ch*bps/8,true); v.setUint16(34,bps,true);
    s(36,'data'); v.setUint32(40,n,true);
    new Uint8Array(buf,44).set(new Uint8Array(bytes));
    return buf;
}

function speak(text) {
    const clean = text.replace(/\[Note:[^\]]+\]/g,'').trim();
    if (!clean) return Promise.resolve();
    stopAudio();
    return new Promise(async resolve => {
        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${encodeURIComponent(apiKey)}`,
                { method:'POST', headers:{'Content-Type':'application/json'},
                  body: JSON.stringify({
                    contents:[{parts:[{text:clean}]}],
                    generationConfig:{
                        responseModalities:['AUDIO'],
                        speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:ttsVoice}}}
                    }
                  })
                }
            );
            if (!res.ok) throw new Error(`TTS ${res.status}`);
            const data = await res.json();
            const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (!b64) throw new Error('no audio');
            const bytes = Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
            const blob  = new Blob([pcmToWav(bytes.buffer)],{type:'audio/wav'});
            const url   = URL.createObjectURL(blob);
            const el    = ttsEl();
            el.src = url;
            el.onended = ()=>{ isTalking=false; updateMic(); URL.revokeObjectURL(url); resolve(); };
            el.onerror = ()=>{ isTalking=false; updateMic(); speakFallback(clean).then(resolve); };
            isTalking=true; updateMic();
            await el.play();
        } catch(err) {
            console.warn('TTS:', err.message);
            await speakFallback(clean);
            resolve();
        }
    });
}

function speakFallback(text) {
    return new Promise(resolve => {
        if (!synth) { resolve(); return; }
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang='en-US'; u.rate=0.90;
        u.onstart=()=>{ isTalking=true;  updateMic(); };
        u.onend  =()=>{ isTalking=false; updateMic(); resolve(); };
        u.onerror=()=>{ isTalking=false; updateMic(); resolve(); };
        synth.speak(u);
    });
}

// ─── Input handling ───────────────────────────────────────────────────────────
function handleInput(text) {
    if (!text.trim()) return;
    setSuggestion('');
    appendMsg(text, 'user');
    callGemini(text);
}

function sendTxt() {
    unlockAudio();
    const el = document.getElementById('txt');
    const t  = el.value.trim();
    if (!t) return;
    el.value = ''; autoResize(el);
    handleInput(t);
}

// ─── Save conversation ────────────────────────────────────────────────────────
function saveConversation() {
    if (!conversationLog.length) { alert('No conversation to save yet.'); return; }
    const s=scenario, now=new Date();
    const date=now.toISOString().slice(0,10), time=now.toTimeString().slice(0,5).replace(':','-');
    let md = `---\ntitle: English Practice - ${s.title}\ndate: ${date}\ntype: conversation-practice\n` +
             `scenario: ${s.id}\ntopic: ${s.topic}\npersona: "${s.persona}"\n` +
             `tags: [english-practice, speaking, ${s.id}]\nsources: []\n---\n\n` +
             `# English Practice: ${s.title}\n\n**With**: ${s.persona}\n**Topic**: ${s.topic}\n` +
             `**Scenario**: ${s.situation}\n**Vocabulary**: ${s.vocabulary.join(', ')}\n\n---\n\n`;
    for (const t of conversationLog) {
        if (t.role==='tutor') md += `**${s.persona.split(',')[0]}**: ${t.text}\n\n`;
        else {
            md += `**Jae**: ${t.original}\n`;
            if (t.improved && t.improved.trim().toLowerCase()!==t.original.trim().toLowerCase())
                md += `> ✦ *${t.improved}*\n`;
            if (t.note) md += `> 📝 ${t.note}\n`;
            md += '\n';
        }
    }
    md += `\n---\n*Saved ${now.toLocaleString()} · Drop into \`raw/inbox/\` for wiki ingestion.*\n`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));
    a.download=`${date}-${time}-english-${s.id}.md`;
    a.click();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>

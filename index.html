<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily English</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ── Setup ── */
        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 28px;
            height: 100dvh;
            gap: 20px;
        }
        .setup-emoji { font-size: 52px; }
        .setup-title { font-size: 26px; font-weight: 700; color: #fff; }
        .setup-desc {
            font-size: 14px; color: #9999b8;
            text-align: center; line-height: 1.6;
        }
        .setup-input {
            width: 100%;
            background: #1e1e30; border: 1px solid #2d2d45;
            border-radius: 12px; padding: 14px 16px;
            color: #e8e8f0; font-size: 15px; outline: none;
        }
        .setup-input:focus { border-color: #5555cc; }
        .setup-btn {
            width: 100%; padding: 16px; border-radius: 12px;
            border: none; background: #4444bb; color: #fff;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .setup-link { font-size: 12px; color: #6b6bcc; text-decoration: none; }

        /* ── Main ── */
        #main-screen {
            display: none;
            flex-direction: column;
            height: 100dvh;
        }

        /* Header */
        .header {
            padding: 14px 18px 10px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1e1e30;
            background: #13131f;
            flex-shrink: 0;
        }
        .header-title { font-size: 17px; font-weight: 700; color: #fff; }
        .header-date { font-size: 11px; color: #6b6b88; margin-top: 1px; }
        .icon-btn {
            background: none; border: none; color: #6b6b88;
            cursor: pointer; padding: 4px; line-height: 0;
        }

        /* Scenario chips */
        .chip-row {
            display: flex; gap: 7px; overflow-x: auto;
            padding: 10px 16px 6px; scrollbar-width: none;
            flex-shrink: 0;
        }
        .chip-row::-webkit-scrollbar { display: none; }
        .chip {
            flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
            font-size: 12px; background: #1a1a28; color: #8888aa;
            cursor: pointer; border: 1px solid #252535;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .chip.active { background: #30305a; color: #9999ee; border-color: #4444aa; }

        /* Scenario card */
        .s-card {
            margin: 0 14px 8px; padding: 12px 14px;
            background: #16162a; border-radius: 11px;
            border: 1px solid #222238;
            flex-shrink: 0;
        }
        .s-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.2px; color: #5555aa; margin-bottom: 3px;
        }
        .s-title { font-size: 14px; font-weight: 600; color: #ddd; margin-bottom: 4px; }
        .s-situation { font-size: 12px; color: #8888a8; line-height: 1.4; margin-bottom: 7px; }
        .vocab-row { display: flex; flex-wrap: wrap; gap: 5px; }
        .vocab-tag {
            font-size: 11px; padding: 2px 8px;
            background: #1e1e38; border-radius: 20px; color: #7070aa;
        }

        /* Chat */
        #chat {
            flex: 1; overflow-y: auto;
            padding: 12px 14px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg {
            max-width: 84%; padding: 10px 13px;
            border-radius: 16px; font-size: 15px; line-height: 1.5;
        }
        .msg.tutor {
            background: #1c1c32; align-self: flex-start;
            border-bottom-left-radius: 4px; color: #dde;
        }
        .msg.user {
            background: #353590; align-self: flex-end;
            border-bottom-right-radius: 4px; color: #fff;
        }
        .msg.correction {
            font-size: 12px; color: #f0c040;
            background: #221a00; border: 1px solid #3a2800;
            align-self: flex-start; font-style: italic;
            padding: 7px 11px;
        }
        .msg.system {
            align-self: center; font-size: 12px;
            color: #555570; background: none; padding: 2px;
        }
        .typing {
            display: flex; gap: 4px; align-items: center;
            padding: 12px 14px; background: #1c1c32;
            border-radius: 16px; border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #5555aa; animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }

        /* Input bar */
        .input-bar {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: #13131f; border-top: 1px solid #1e1e30;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            flex-shrink: 0;
        }
        .mic-btn {
            width: 70px; height: 70px; border-radius: 50%;
            border: none; background: #3a3aaa;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .15s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 18px rgba(58,58,170,.45);
        }
        .mic-btn.recording {
            background: #bb2222;
            box-shadow: 0 4px 22px rgba(187,34,34,.6);
            animation: pulse 1s infinite;
        }
        .mic-btn.speaking {
            background: #1a7744;
            box-shadow: 0 4px 18px rgba(26,119,68,.5);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.07); }
        }
        .mic-hint { font-size: 12px; color: #55556a; }
        .text-row { display: flex; width: 100%; gap: 8px; }
        .text-in {
            flex: 1; background: #1a1a2c; border: 1px solid #252540;
            border-radius: 22px; padding: 10px 15px;
            color: #e8e8f0; font-size: 15px; outline: none;
        }
        .text-in:focus { border-color: #4040aa; }
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            border: none; background: #3a3aaa; color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
        }
    </style>
</head>
<body>

<!-- ── Setup ── -->
<div id="setup-screen">
    <div class="setup-emoji">🗣️</div>
    <div class="setup-title">Daily English</div>
    <div class="setup-desc">
        Voice conversation practice using your own knowledge topics.<br>
        Powered by Gemini 2.0 Flash.
    </div>
    <input id="key-in" type="password" class="setup-input"
           placeholder="Paste your Gemini API key"
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="setup-btn" onclick="saveKey()">Start Practicing</button>
    <a class="setup-link" href="https://aistudio.google.com/apikey" target="_blank">
        Get a free key at aistudio.google.com →
    </a>
</div>

<!-- ── Main ── -->
<div id="main-screen">
    <div class="header">
        <div>
            <div class="header-title">Daily English</div>
            <div class="header-date" id="hdr-date"></div>
        </div>
        <button class="icon-btn" onclick="goSetup()" title="Settings">
            <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54A.48.48 0 0 0 14 2h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.1 7.1 0 0 0-1.61.94l-2.4-.96a.48.48 0 0 0-.58.22L2.8 8.47a.47.47 0 0 0 .11.61l2.03 1.58A7.2 7.2 0 0 0 4.86 12c0 .32.02.63.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.06.28.31.48.59.48h3.84c.28 0 .53-.2.58-.48l.36-2.54c.58-.27 1.12-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/>
            </svg>
        </button>
    </div>

    <div class="chip-row" id="chip-row"></div>
    <div class="s-card" id="s-card"></div>

    <div id="chat"></div>

    <div class="input-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            <svg width="28" height="28" fill="white" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
            </svg>
        </button>
        <div class="mic-hint" id="mic-hint">Tap mic to speak</div>
        <div class="text-row">
            <input id="txt" type="text" class="text-in"
                   placeholder="Or type here…"
                   autocorrect="off" spellcheck="false"
                   onkeydown="if(event.key==='Enter')sendTxt()" />
            <button class="send-btn" onclick="sendTxt()">
                <svg width="17" height="17" fill="white" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
// ─── Scenarios (from wiki knowledge) ─────────────────────────────────────────

const SCENARIOS = [
  {
    id: "quant-ml",
    topic: "Quant Finance",
    title: "ML Models in Trading",
    persona: "Dr. Sarah Chen, senior quant researcher at a hedge fund",
    situation: "Coffee chat — she wants your take on whether transformer models justify the hype in finance.",
    opening: "I saw you've been reading a lot about transformers for time series. Honestly — do you think the hype is justified, or are people just chasing benchmarks again?",
    vocabulary: ["alpha generation", "factor momentum", "overfitting", "regime detection", "Sharpe ratio"],
    hints: ["Discuss DeepLOB and LOB microstructure forecasting", "Mention the overfitting/GT-score problem in backtesting", "Talk about why models need regime awareness"]
  },
  {
    id: "quant-risk",
    topic: "Risk & Volatility",
    title: "Volatility Forecasting Debate",
    persona: "Marcus, a risk manager who trusts traditional GARCH models",
    situation: "You're pitching Bayesian and ML volatility approaches to a skeptic who has used GARCH for 15 years.",
    opening: "I've been using GARCH for fifteen years and it works fine. Why should I bother with Bayesian or ML approaches? What are they actually solving?",
    vocabulary: ["GARCH", "Hurst exponent", "tail risk", "drawdown", "volatility clustering"],
    hints: ["Explain VI-GARCH: faster than MCMC, real-time capable", "Describe why individual stock volatility is rougher than index (idiosyncratic shocks)", "Mention regime-switching and HAR models"]
  },
  {
    id: "quant-rl",
    topic: "Quant Finance",
    title: "Reinforcement Learning for Trading",
    persona: "Lena, a VC evaluating a quant fintech startup",
    situation: "You're explaining why RL-based trading systems are promising — and where they break — to a skeptical investor.",
    opening: "Everyone's pitching RL trading bots right now. But I keep seeing the same pattern — great backtests, terrible live results. What's actually different about the serious approaches?",
    vocabulary: ["reward function", "Q-learning", "market impact", "adaptability", "benchmark"],
    hints: ["Mention LLM-guided DDQN: combines LLM signals with RL decisions", "Explain why live markets punish rigid agents (adaptability + risk control)", "Discuss the market-making DRL paper: bid-ask spread, inventory management"]
  },
  {
    id: "claude-code",
    topic: "AI Dev Tools",
    title: "Agentic Coding with Claude",
    persona: "Jamie, a startup CTO choosing between AI coding tools",
    situation: "You're recommending Claude Code to a CTO who uses GitHub Copilot and doesn't see the difference.",
    opening: "Everyone keeps telling me to try Claude Code or Cursor. But I already have Copilot — it suggests lines, it saves time. What's fundamentally different about these 'agentic' tools?",
    vocabulary: ["agentic workflow", "sub-agents", "context window", "code execution", "multi-step tasks"],
    hints: ["Explain: Copilot autocompletes; agentic tools plan and execute whole features", "Mention Claude Code's workflow feature that manages sub-agents dynamically", "Discuss long-horizon tasks: debugging, refactoring, writing tests end-to-end"]
  },
  {
    id: "gemini-ecosystem",
    topic: "AI Dev Tools",
    title: "Google Gemini for Developers",
    persona: "Priya, a PM evaluating AI APIs for her team",
    situation: "Her team has been using OpenAI; the CTO wants a Gemini evaluation. She's asking for your honest comparison.",
    opening: "Our CTO wants us to look at Gemini seriously, but honestly we've built everything around OpenAI. What would actually make the switch worth the migration pain?",
    vocabulary: ["managed agents", "multimodal", "file input", "rate limits", "API ecosystem"],
    hints: ["Mention Gemini Managed Agents: full stack with Linux sandbox and web browsing in one call", "Gemini 3.5 Flash for fast agentic workflows", "5× file-size increase (20MB→100MB) and cloud storage direct input"]
  },
  {
    id: "flutterflow",
    topic: "App Development",
    title: "Visual vs. Code-First Mobile Dev",
    persona: "Chris, a solo developer building his first mobile app",
    situation: "He's deciding between Flutter from scratch or FlutterFlow/DreamFlow. You've used both.",
    opening: "I have a basic idea for a mobile app but I'm not a strong Flutter developer yet. Should I learn Flutter properly or just use FlutterFlow? I keep going back and forth.",
    vocabulary: ["visual builder", "native performance", "code generation", "iteration speed", "production-ready"],
    hints: ["DreamFlow now has tri-surface: visual + code + agent-driven changes together", "FlutterFlow MCP lets Claude Code and Cursor edit the visual app via CLI", "For production apps: FlutterFlow handles 80% faster; drop to code for the remaining 20%"]
  },
  {
    id: "singapore-trip",
    topic: "Travel",
    title: "Family Trip to Singapore",
    persona: "Alex, a friend who lived in Singapore for 3 years",
    situation: "You're planning a family trip in August 2026. Alex knows Singapore well and you want practical advice.",
    opening: "Singapore in August — great choice! It's hot and humid, but there's so much to do. So are you thinking relaxed tourist mode, or do you want the real local experience?",
    vocabulary: ["hawker center", "MRT", "itinerary", "heritage trails", "family-friendly"],
    hints: ["Ask about must-visit hawker centers for authentic local food", "Discuss Gardens by the Bay, Sentosa, and less-touristy areas", "Ask about August weather and what to pack for humidity and rain"]
  },
  {
    id: "pyeongchang",
    topic: "Travel",
    title: "Pyeongchang Weekend Getaway",
    persona: "Soyeon, a colleague who loves weekend trips in Korea",
    situation: "You're convincing her that Pyeongchang in June is a great idea — she thinks it's just the Olympics venue.",
    opening: "Wait, Pyeongchang? I always thought of that as a winter destination — just the Olympics ski slopes. Is there actually anything interesting to do there in June?",
    vocabulary: ["scenic drive", "mountain village", "local cuisine", "weekend itinerary", "off-the-beaten-path"],
    hints: ["Describe the mountain landscapes and peaceful rural atmosphere in summer", "Mention Korean mountain food: buckwheat noodles, local tofu dishes", "Suggest the route and what to do in 2 days"]
  },
  {
    id: "theatre-education",
    topic: "Arts Education",
    title: "Theatre for Children",
    persona: "Nora, a drama teacher writing a school arts program proposal",
    situation: "She's asking you to help her articulate why theatre should be core curriculum, not extracurricular. You believe in this strongly.",
    opening: "I'm writing a proposal to make drama part of the core curriculum — not just an after-school club. But the principal wants hard evidence. How would you make the case?",
    vocabulary: ["creative confidence", "public speaking", "emotional intelligence", "empathy", "performing arts"],
    hints: ["Theatre builds confidence to speak in front of others — a lifelong skill", "Role-playing teaches empathy: understanding characters different from yourself", "Collaboration in productions teaches teamwork in a way textbooks can't"]
  },
  {
    id: "howard-marks",
    topic: "Investment Philosophy",
    title: "Market Cycles & Second-Level Thinking",
    persona: "Robert, a value investor and fan of Howard Marks' memos",
    situation: "Lunch with a fellow investor — he just finished Marks' latest memo and wants to debate whether markets are currently overvalued.",
    opening: "I just finished Marks' latest memo on cycles. His point about everyone knowing we're late in the cycle, but nobody acting on it — that stuck with me. Do you think we're actually near a top?",
    vocabulary: ["market cycle", "second-level thinking", "risk-adjusted return", "contrarian", "margin of safety"],
    hints: ["Explain Marks' key idea: where we stand in the cycle matters more than individual stock picks", "Describe second-level thinking: ask what others think, then ask what they're missing", "Discuss how to act when everyone agrees the market is expensive"]
  }
];

// ─── State ────────────────────────────────────────────────────────────────────
let apiKey = '';
let scenario = null;
let history = [];
let recog = null;
let isRec = false;
let isTalking = false;
const synth = window.speechSynthesis;

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
    apiKey = localStorage.getItem('g-key') || '';
    if (apiKey) showMain();

    const d = new Date();
    const el = document.getElementById('hdr-date');
    if (el) el.textContent = d.toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric'
    });
}

function saveKey() {
    const k = document.getElementById('key-in').value.trim();
    if (!k) { alert('Please enter your API key.'); return; }
    apiKey = k;
    localStorage.setItem('g-key', k);
    showMain();
}

function goSetup() {
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
    synth.cancel();
}

function showMain() {
    document.getElementById('setup-screen').style.display = 'none';
    const m = document.getElementById('main-screen');
    m.style.display = 'flex';
    renderChips();
    const dayOfYear = Math.floor(
        (new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000
    );
    pickScenario(dayOfYear % SCENARIOS.length);
}

// ─── Scenario ─────────────────────────────────────────────────────────────────
function renderChips() {
    const row = document.getElementById('chip-row');
    row.innerHTML = SCENARIOS.map((s, i) =>
        `<div class="chip" id="chip-${i}" onclick="pickScenario(${i})">${s.topic}</div>`
    ).join('');
}

function pickScenario(idx) {
    document.querySelectorAll('.chip').forEach((c, i) =>
        c.classList.toggle('active', i === idx));

    scenario = SCENARIOS[idx];
    history = [];
    synth.cancel();

    document.getElementById('s-card').innerHTML = `
        <div class="s-label">${scenario.topic}</div>
        <div class="s-title">${scenario.title}</div>
        <div class="s-situation">${scenario.situation}</div>
        <div class="vocab-row">${scenario.vocabulary.map(v =>
            `<span class="vocab-tag">${v}</span>`).join('')}</div>`;

    const chat = document.getElementById('chat');
    chat.innerHTML = '';
    sysMsg(`With: ${scenario.persona}`);

    setTimeout(() => tutorSay(scenario.opening), 350);
}

// ─── Chat helpers ─────────────────────────────────────────────────────────────
function sysMsg(t) {
    appendMsg(t, 'system');
}

function appendMsg(t, cls) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = `msg ${cls}`;
    el.textContent = t;
    chat.appendChild(el);
    scrollDown();
    return el;
}

function showTyping() {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.id = 'typing'; el.className = 'typing';
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(el);
    scrollDown();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function scrollDown() {
    const c = document.getElementById('chat');
    setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 40);
}

function tutorSay(text) {
    history.push({ role: 'model', parts: [{ text }] });

    // Split off [Note: …] corrections
    const m = text.match(/^([\s\S]+?)(\s*\[Note:[^\]]+\])?\s*$/);
    const main = m?.[1]?.trim() || text;
    const note = m?.[2]?.trim();

    appendMsg(main, 'tutor');
    if (note) setTimeout(() => appendMsg(note, 'correction'), 150);

    speak(main);
}

// ─── Gemini API ───────────────────────────────────────────────────────────────
function sysPrompt() {
    const s = scenario;
    return `You are ${s.persona}, speaking with Jae (Korean software engineer & quant finance researcher).

SCENARIO: ${s.situation}

YOUR RULES:
- Stay in character. Be natural, warm, curious.
- Keep every reply SHORT — 2 to 4 sentences. This is spoken conversation.
- If Jae makes a clear grammar mistake, add a gentle note at the end: [Note: "..." should be "..."]
- Weave in these terms naturally when relevant: ${s.vocabulary.join(', ')}
- Always end with a question or invitation so the conversation continues.
- NEVER give long lectures. React, ask, engage.`;
}

async function callGemini(userText) {
    history.push({ role: 'user', parts: [{ text: userText }] });
    showTyping();

    try {
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: sysPrompt() }] },
                    contents: history,
                    generationConfig: { temperature: 0.82, maxOutputTokens: 280 }
                })
            }
        );
        hideTyping();

        if (!res.ok) {
            const e = await res.json().catch(() => ({}));
            const msg = e?.error?.message || `HTTP ${res.status}`;
            appendMsg(`⚠ API error: ${msg}`, 'system');
            if (msg.toLowerCase().includes('api key')) goSetup();
            return;
        }

        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '(no response)';
        tutorSay(text);

    } catch (err) {
        hideTyping();
        appendMsg(`⚠ Network error: ${err.message}`, 'system');
    }
}

// ─── Speech Input ─────────────────────────────────────────────────────────────
function initRecog() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;

    const r = new SR();
    r.continuous = false;
    r.interimResults = false;
    r.lang = 'en-US';

    r.onresult = e => {
        const t = e.results[0][0].transcript;
        stopRec();
        handleInput(t);
    };
    r.onerror = e => {
        stopRec();
        if (e.error !== 'no-speech') appendMsg(`Mic error: ${e.error}`, 'system');
    };
    r.onend = () => { if (isRec) stopRec(); };
    return r;
}

function toggleMic() {
    if (isTalking) { synth.cancel(); isTalking = false; updateMic(); return; }
    isRec ? stopRec() : startRec();
}

function startRec() {
    if (!recog) recog = initRecog();
    if (!recog) {
        document.getElementById('txt').focus();
        appendMsg('Voice not available in this browser — please type.', 'system');
        return;
    }
    synth.cancel();
    try { recog.start(); } catch (e) { return; }
    isRec = true; updateMic();
}

function stopRec() {
    try { recog?.stop(); } catch (e) {}
    isRec = false; updateMic();
}

function updateMic() {
    const btn = document.getElementById('mic-btn');
    const hint = document.getElementById('mic-hint');
    btn.className = 'mic-btn';
    if (isRec) {
        btn.classList.add('recording');
        hint.textContent = 'Listening… tap to stop';
    } else if (isTalking) {
        btn.classList.add('speaking');
        hint.textContent = 'Tap mic to interrupt';
    } else {
        hint.textContent = 'Tap mic to speak';
    }
}

// ─── Text-to-Speech ───────────────────────────────────────────────────────────
function speak(text) {
    if (!synth) return;
    const clean = text.replace(/\[Note:[^\]]+\]/g, '').trim();
    synth.cancel();

    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'en-US';
    u.rate = 0.90;
    u.pitch = 1.0;

    const voices = synth.getVoices();
    const pick = voices.find(v =>
        v.lang.startsWith('en') &&
        (v.name.includes('Samantha') || v.name.includes('Karen') ||
         v.name.includes('Moira') || v.name.includes('Google US'))
    ) || voices.find(v => v.lang.startsWith('en-US'));
    if (pick) u.voice = pick;

    u.onstart = () => { isTalking = true;  updateMic(); };
    u.onend   = () => { isTalking = false; updateMic(); };
    u.onerror = () => { isTalking = false; updateMic(); };
    synth.speak(u);
}

if (synth) synth.addEventListener('voiceschanged', () => {});

// ─── Input handler ────────────────────────────────────────────────────────────
function handleInput(text) {
    if (!text.trim()) return;
    appendMsg(text, 'user');
    callGemini(text);
}

function sendTxt() {
    const el = document.getElementById('txt');
    const t = el.value.trim();
    if (!t) return;
    el.value = '';
    handleInput(t);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
